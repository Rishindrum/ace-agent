<div class="ingest-container">
  <form (submit)="onSubmit()" class="ingest-form">
    <div class="form-row">
      <div class="input-group">
        <label for="weekNumber">Week Number</label>
        <input type="number" id="weekNumber" name="weekNumber" [(ngModel)]="weekNumber" required min="1" placeholder="e.g. 1" [disabled]="isLoading" />
      </div>
      
      <div class="input-group">
        <label for="topicName">Topic Name</label>
        <input type="text" id="topicName" name="topicName" [(ngModel)]="topicName" required placeholder="e.g. Linear Algebra" [disabled]="isLoading" />
      </div>
    </div>

    <div class="input-group full-width">
      <label for="rawText">Material Text Content</label>
      <textarea id="rawText" name="rawText" [(ngModel)]="rawText" required placeholder="Paste the slides transcripts, course notes, or material text content here..." rows="6" [disabled]="isLoading"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="isLoading || weekNumber === null || !topicName || !rawText">
        <mat-icon>add_link</mat-icon> Ingest Material
      </button>
    </div>
  </form>

  <div *ngIf="isLoading" class="progress-bar-placeholder">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </div>

  <div *ngIf="responseMessage" class="status-alert" [ngClass]="{'success': isSuccess, 'error': !isSuccess && !isLoading, 'info': isLoading}">
    <mat-icon *ngIf="isSuccess">check_circle</mat-icon>
    <mat-icon *ngIf="!isSuccess && !isLoading">error</mat-icon>
    <mat-icon *ngIf="isLoading">sync</mat-icon>
    <span>{{ responseMessage }}</span>
  </div>
</div>
