syntax = "proto3";

package ace;

option go_package = "ace-agent/backend-go/proto";

service TutorService {
  rpc ProcessSyllabus (SyllabusRequest) returns (SyllabusResponse);
  rpc Chat (ChatRequest) returns (ChatResponse);
  rpc SubmitQuizResult (QuizResultRequest) returns (QuizResultResponse);
  rpc GenerateAdaptiveQuiz (AdaptiveQuizRequest) returns (AdaptiveQuizResponse);
  rpc GetQuizScores (GetQuizScoresRequest) returns (GetQuizScoresResponse);
  rpc IngestMaterial (IngestRequest) returns (IngestResponse);
  rpc GenerateQuiz (QuizRequest) returns (QuizResponse);
  rpc GenerateCramSession (CramRequest) returns (CramResponse);
  rpc GenerateLesson (LessonRequest) returns (LessonResponse);
  rpc GenerateLessonAndExercises (LessonRequest) returns (LessonResponse);
  rpc CheckTopicSufficiency (SufficiencyRequest) returns (SufficiencyResponse);
  rpc DeleteClass (DeleteClassRequest) returns (DeleteClassResponse);
  rpc GetSyllabus (GetSyllabusRequest) returns (GetSyllabusResponse);
  rpc EditSyllabus (EditSyllabusRequest) returns (EditSyllabusResponse);
  rpc GetMaterials (GetMaterialsRequest) returns (GetMaterialsResponse);
  rpc DeleteMaterial (DeleteMaterialRequest) returns (DeleteMaterialResponse);
  rpc ParseDocument (ParseDocumentRequest) returns (ParseDocumentResponse);
}

message SyllabusRequest {
  string file_name = 1;
  bytes file_data = 2;
  string user_id = 3;
  string class_id = 4;
  string class_name = 5;
}

message SyllabusResponse {
  bool success = 1;
  string message = 2;
  int32 nodes_created = 3;
  string graph_json = 4;
}

message ChatRequest {
  string message = 1;      // The user's question
  string session_id = 2;   // To track conversation history later
  string user_id = 3;
  string class_id = 4;
}

message ChatResponse {
  string response = 1;     // The AI's answer
}

// Sent by UI when a student finishes a quiz
message QuizResultRequest {
  string user_id = 1;
  string topic_name = 2;
  int32 score = 3; 
  string class_id = 4;
}

message QuizResultResponse {
  bool success = 1;
  string message = 2;
}

// Sent by UI when a student clicks "Generate Review Quiz"
message AdaptiveQuizRequest {
  string user_id = 1;
  string syllabus_name = 2; // Which class are they studying for?
  string class_id = 3;
}

// We can reuse ChatResponse for the quiz return, or make a specific one:
message AdaptiveQuizResponse {
  string quiz_json = 1; // Gemini's strict JSON output of questions
}

// Sent by UI to read student performance/scores
message GetQuizScoresRequest {
  string user_id = 1;
  string class_id = 2;
}

message QuizScoreRecord {
  string user_id = 1;
  string topic_name = 2;
  int32 score = 3;
  string timestamp = 4;
  string class_id = 5;
}

message GetQuizScoresResponse {
  repeated QuizScoreRecord scores = 1;
  bool success = 2;
  string message = 3;
}

message IngestRequest {
  int32 week_number = 1;
  string topic_name = 2;
  string raw_text = 3;
  string user_id = 4;
  string class_id = 5;
  string class_name = 6;
  bytes file_data = 7;
  string file_name = 8;
}

message IngestResponse {
  bool success = 1;
  string message = 2;
}

message QuizRequest {
  int32 week_number = 1;
  int32 question_count = 2;
  string user_id = 3;
  bool regenerate = 4;
  string regeneration_prompt = 5;
  repeated string weak_topics = 6;
  string class_id = 7;
}

message Question {
  string id = 1;
  string question_text = 2;
  repeated string options = 3;
  int32 correct_option_index = 4;
}

message QuizResponse {
  repeated Question questions = 1;
}

message CramRequest {
  string user_id = 1;
  int32 start_week = 2;
  int32 end_week = 3;
  repeated string weak_topics = 4;
  string class_id = 5;
}

message CramResponse {
  string dense_review_markdown = 1;
  repeated Question rapid_fire_quiz = 2;
}

message LessonRequest {
  int32 week_number = 1;
  string user_id = 2;
  repeated string weak_topics = 3;
  bool regenerate = 4;
  string regeneration_prompt = 5;
  string class_id = 6;
}

message LessonResponse {
  string lesson_markdown = 1;
  repeated Question exercises = 2;
  bool insufficient_materials = 3;
}

message SufficiencyRequest {
  string user_id = 1;
  string class_id = 2;
  int32 week_number = 3;
}

message SufficiencyResponse {
  bool insufficient_materials = 1;
  repeated string insufficient_topics = 2;
  repeated string all_topics = 3;
}

message DeleteClassRequest {
  string user_id = 1;
  string class_id = 2;
}

message DeleteClassResponse {
  bool success = 1;
  string message = 2;
}

message WeekTopics {
  int32 week_number = 1;
  repeated string topics = 2;
}

message GetSyllabusRequest {
  string user_id = 1;
  string class_id = 2;
}

message GetSyllabusResponse {
  repeated WeekTopics weeks = 1;
  bool success = 2;
  string message = 3;
}

message EditSyllabusRequest {
  string user_id = 1;
  string class_id = 2;
  repeated WeekTopics weeks = 3;
}

message EditSyllabusResponse {
  bool success = 1;
  string message = 2;
}

message GetMaterialsRequest {
  string user_id = 1;
  string class_id = 2;
}

message MaterialInfo {
  string material_id = 1;
  string filename = 2;
  string topic_name = 3;
  int32 week_number = 4;
  string content = 5;
  string created_at = 6;
}

message GetMaterialsResponse {
  repeated MaterialInfo materials = 1;
  bool success = 2;
  string message = 3;
}

message DeleteMaterialRequest {
  string user_id = 1;
  string class_id = 2;
  string material_id = 3;
}

message DeleteMaterialResponse {
  bool success = 1;
  string message = 2;
}

message ParseDocumentRequest {
  bytes file_data = 1;
  string file_name = 2;
}

message ParseDocumentResponse {
  string parsed_text = 1;
  bool success = 2;
  string message = 3;
}